name: InviteKitDemo
options:
  bundleIdPrefix: com.cn1invite
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  InviteKit:
    path: ../..

targets:
  # Main App Target
  InviteKitDemo:
    type: application
    platform: iOS
    sources:
      - InviteKitDemo
    dependencies:
      - package: InviteKit
        product: InviteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cn1invite.demo
        INFOPLIST_FILE: InviteKitDemo/Info.plist
        CODE_SIGN_ENTITLEMENTS: InviteKitDemo/InviteKitDemo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: InviteKitDemo/Info.plist
      properties:
        CFBundleDisplayName: InviteKit Demo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: InviteKitDemo/InviteKitDemo.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cn1invite.demo.invite
        com.apple.developer.parent-application-identifiers:
          - $(AppIdentifierPrefix)com.cn1invite.demo

  # App Clip Target
  InviteKitDemoClip:
    type: app-clip
    platform: iOS
    sources:
      - InviteKitDemoClip
    dependencies:
      - package: InviteKit
        product: CN1InviteKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cn1invite.demo.Clip
        INFOPLIST_FILE: InviteKitDemoClip/Info.plist
        CODE_SIGN_ENTITLEMENTS: InviteKitDemoClip/InviteKitDemoClip.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: InviteKitDemoClip/Info.plist
      properties:
        CFBundleDisplayName: InviteKit Demo
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen: {}
        NSAppClip:
          NSAppClipRequestLocationConfirmation: false
          NSAppClipRequestEphemeralUserNotification: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    entitlements:
      path: InviteKitDemoClip/InviteKitDemoClip.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cn1invite.demo.invite
        com.apple.developer.parent-application-identifiers:
          - $(AppIdentifierPrefix)com.cn1invite.demo
        com.apple.developer.associated-domains:
          - appclips:demo.cn1invite.com

schemes:
  InviteKitDemo:
    build:
      targets:
        InviteKitDemo: all
        InviteKitDemoClip: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release
