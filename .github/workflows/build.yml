name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Xcode ${{ matrix.xcode }})
    runs-on: macos-14
    strategy:
      matrix:
        xcode: ['15.4']
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode ${{ matrix.xcode }}
        run: sudo xcode-select -s /Applications/Xcode_${{ matrix.xcode }}.app

      - name: Build InviteKit
        run: swift build

      - name: Build CN1InviteKit
        run: swift build --target CN1InviteKit

      - name: Run InviteKit Tests
        run: swift test --filter InviteKitTests

      - name: Run CN1InviteKit Tests
        run: swift test --filter CN1InviteKitTests
